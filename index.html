<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Testimonial Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slider">
  <div class="slides">

    <div class="slide active">
      <p>"This service is amazing! Highly recommended."</p>
      <h3>- John Doe</h3>
    </div>

    <div class="slide">
      <p>"Great experience and excellent support."</p>
      <h3>- Sarah Smith</h3>
    </div>

    <div class="slide">
      <p>"Absolutely loved it! Will use again."</p>
      <h3>- Alex Brown</h3>
    </div>

  </div>

  <button id="prev">&#10094;</button>
  <button id="next">&#10095;</button>

</div>

<script src="script.js"></script>
</body>
</html>
